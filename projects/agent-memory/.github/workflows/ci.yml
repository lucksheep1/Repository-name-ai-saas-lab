name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12']
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install dependencies
        run: |
          cd projects/agent-memory
          pip install -e ".[all]"
          pip install pytest pytest-cov redis
      
      - name: Run tests
        run: |
          cd projects/agent-memory
          python test_all_backends.py
      
      - name: Run demo
        run: |
          cd projects/agent-memory
          python demo_30s.py

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install linting
        run: pip install ruff
      
      - name: Lint code
        run: |
          cd projects/agent-memory
          ruff check agent_memory.py cli.py
