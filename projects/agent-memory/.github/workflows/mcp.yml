name: MCP Server Release

on:
  push:
    branches: [main]
    paths:
      - 'projects/agent-memory/mcp_server/**'
  release:
    types: [published]

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      
      - name: Install and test
        run: |
          cd projects/agent-memory
          pip install -e .
          python -c "from mcp_server.server import AgentMemoryMCPServer; print('MCP Server OK')"
      
      - name: Create GitHub Release
        if: github.event_name == 'release'
        run: |
          echo "Release ${{ github.event.release.tag_name }}"